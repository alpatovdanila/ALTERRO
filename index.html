<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ALTERRO — Hollow Crusade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Russo+One&family=Oswald:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="canvas-host"></div>

      <!-- fullscreen post overlays (cheap "shader" layer) -->
      <div id="fx-flash"></div>
      <div id="fx-red"></div>
      <div id="fx-choir"></div>
      <div id="fx-fade"></div>
      <!-- screen-edge states: bleeding out / relic charged -->
      <div id="edge-low"></div>
      <div id="edge-ult"></div>
      <!-- big center announcements: ULTIMATE READY / LEVEL UP -->
      <div id="announce"></div>
      <!-- overload's final-seconds countdown -->
      <div id="ult-timer" class="hidden"></div>

      <!-- HUD -->
      <div id="hud" class="hidden">
        <div id="hud-top">
          <div id="hp-wrap">
            <div id="hp-label">ЗДОРОВЬЕ</div>
            <div id="hp-bar"><div id="hp-fill"></div></div>
          </div>
          <div id="room-label">ЗАЛ 1</div>
          <div id="xp-wrap">
            <div id="xp-label">УРОВЕНЬ <span id="level-num">1</span></div>
            <div id="xp-bar"><div id="xp-fill"></div></div>
          </div>
        </div>
        <div id="boss-wrap" class="hidden">
          <div id="boss-name">ПРОРАБ</div>
          <div id="boss-bar"><div id="boss-fill"></div></div>
        </div>
        <div id="dread-wrap">
          <svg id="dread-ring" viewBox="0 0 100 100">
            <circle class="ring-bg" cx="50" cy="50" r="42" />
            <circle class="ring-fill" id="dread-fill" cx="50" cy="50" r="42" />
          </svg>
          <div id="dread-icon">☠</div>
          <div id="dread-hint" class="hidden">ПРОБЕЛ — ВЫПУСТИТЬ</div>
        </div>
      </div>

      <!-- dev overlays: perf monitor (F3) + GTAO tuning (F4) -->
      <div id="perf"></div>
      <div id="gtao-panel" class="hidden"></div>

      <!-- modal screens (start / wheel / death / victory) -->
      <div id="screen"></div>

      <!-- boot loader: visible from the first painted frame until warmup ends -->
      <div id="loader">
        <div id="loader-title">ALTERRO</div>
        <div id="loader-text">ПОДГОТОВКА ПОЛЯ БОЯ…</div>
        <div id="loader-bar"><div id="loader-fill"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
